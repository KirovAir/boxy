name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Boxy.slnx

      - name: Build
        run: dotnet build Boxy.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Boxy.slnx -c Release --no-build --verbosity normal

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image (no push)
        run: docker build -f Boxy.Web/Dockerfile -t boxy:ci .
